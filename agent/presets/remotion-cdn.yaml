# Remotion CDN access — Chrome headless shell downloads and Remotion docs/redirects.

preset:
  name: remotion-cdn
  description: "Remotion CDN for Chrome headless shell + assets"

network_policies:
  remotion-cdn:
    name: remotion-cdn
    endpoints:
      - host: remotion.media
        port: 443
        access: full
      - host: www.remotion.dev
        port: 443
        access: full
      - host: remotion.dev
        port: 443
        access: full
      - host: storage.googleapis.com
        port: 443
        access: full
    binaries:
      - { path: "/**" }
