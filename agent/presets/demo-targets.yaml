# Demo target sites for the explainer agent.
# Whitelisted apps the agent is allowed to drive in feasibility runs.

preset:
  name: demo-targets
  description: "Whitelisted demo web apps the explainer agent navigates"

network_policies:
  demo-targets:
    name: demo-targets
    endpoints:
      - host: ui.shadcn.com
        port: 443
        access: full
      - host: shadcn.com
        port: 443
        access: full
      # shadcn assets sometimes load from Vercel's CDN
      - host: assets.vercel.com
        port: 443
        access: full
      # NVIDIA documentation portal — the agent navigates these for
      # NemoClaw / Nemotron / NIM docs experiments.
      - host: docs.nvidia.com
        port: 443
        access: full
      - host: developer.nvidia.com
        port: 443
        access: full
      # NVIDIA docs often pulls fonts + CSS from these:
      - host: www.nvidia.com
        port: 443
        access: full
      - host: images.nvidia.com
        port: 443
        access: full
      # docs.nvidia.com is built on Fern (https://buildwithfern.com).
      # ALL its CSS/JS/font assets load from app.buildwithfern.com — without
      # this whitelist, the docs render as unstyled raw HTML in the agent's
      # browser.
      - host: app.buildwithfern.com
        port: 443
        access: full
      - host: cdn.buildwithfern.com
        port: 443
        access: full
      - host: files.buildwithfern.com
        port: 443
        access: full
      # Many NVIDIA docs pages (including the docs.nvidia.com root SPA and
      # older sphinx-style pages like the NeMo Framework user guide) load
      # their CSS bundles + scripts from docscontent.nvidia.com. Without
      # this host, pages render as unstyled raw HTML.
      - host: docscontent.nvidia.com
        port: 443
        access: full
      # Asset CDN seen on root pages for NVIDIA logo + chatbot JS
      - host: d4j85rjepgcta.cloudfront.net
        port: 443
        access: full
      # Stripe docs — Dennis explicitly requested. docs.stripe.com is the
      # navigation target; the others are the common subresources Stripe's
      # docs pull in (JS SDK, CDN, beacon, recaptcha-like q/r endpoints).
      - host: docs.stripe.com
        port: 443
        access: full
      - host: js.stripe.com
        port: 443
        access: full
      - host: b.stripecdn.com
        port: 443
        access: full
      - host: q.stripe.com
        port: 443
        access: full
      - host: r.stripe.com
        port: 443
        access: full
      # Excalidraw — v23 "agent draws a square" demo. Main app + asset CDNs.
      - host: excalidraw.com
        port: 443
        access: full
      - host: assets.excalidraw.com
        port: 443
        access: full
      - host: oss.excalidraw.com
        port: 443
        access: full
      - host: libraries.excalidraw.com
        port: 443
        access: full
      - host: fonts.excalidraw.com
        port: 443
        access: full
      # Auto-added by auto-allowlist.sh
      - host: cdn.docs.stripe.com
        port: 443
        access: full
      - host: assets.docs.stripe.com
        port: 443
        access: full
      - host: static.docs.stripe.com
        port: 443
        access: full
