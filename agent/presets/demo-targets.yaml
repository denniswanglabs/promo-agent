        port: 443
        access: full
      # v28 YC UI fix: the agent screencaps `https://www.ycombinator.com`
      # rendered as a bare HTML page (no fonts/CSS/JS) because the entire
      # YC SPA (CSS bundles, Vite chunks, React bundle, fonts) loads from
      # `bookface-static.ycombinator.com` — a CDN host the auto-allowlist
      # generic pattern (cdn.HOST / assets.HOST / static.HOST) does NOT
      # match. Without this entry, `/` and `/library` render unstyled.
      # cdn.dfsdk.com hosts the YC chatbot widget JS; posthog is analytics.
      - host: bookface-static.ycombinator.com
        port: 443
        access: full
      - host: bookface.ycombinator.com
        port: 443
        access: full
      - host: cdn.dfsdk.com
        port: 443
        access: full
      - host: app.posthog.com
        port: 443
        access: full
      # Auto-added by auto-allowlist.sh
      - host: account.ycombinator.com
        port: 443
        access: full
      - host: deals.ycombinator.com
        port: 443
        access: full
      - host: news.ycombinator.com
        port: 443
        access: full
    binaries:
      - { path: "/**" }
